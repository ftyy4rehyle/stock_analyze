<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bower Stock</title>
  <script src="https://unpkg.com/lightweight-charts@4.2.0/dist/lightweight-charts.standalone.production.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      min-height: 100vh;
    }

    /* Header */
    header {
      background: #1e293b;
      padding: 14px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid #334155;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    header .logo { font-size: 1.1rem; font-weight: 700; }
    header .user { display: flex; align-items: center; gap: 12px; }
    header .username { font-size: 0.85rem; color: #cbd5e1; }
    header a { color: #94a3b8; font-size: 0.8rem; text-decoration: none; }
    header a:hover { color: #e2e8f0; }

    main { max-width: 800px; margin: 0 auto; padding: 20px 16px; }

    /* Add stock */
    .add-form {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 8px;
    }
    .add-form input {
      flex: 1;
      min-width: 100px;
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 8px;
      padding: 10px 14px;
      color: #e2e8f0;
      font-size: 0.95rem;
      outline: none;
    }
    .add-form input:focus { border-color: #3b82f6; }
    .add-form input::placeholder { color: #94a3b8; }
    .add-hint { font-size: 0.75rem; color: #64748b; margin-bottom: 20px; margin-top: -12px; }
    .btn {
      background: #3b82f6;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 10px 18px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    .btn:hover { background: #2563eb; }
    .btn:disabled { background: #334155; cursor: default; }

    /* Stock list */
    .section-title {
      font-size: 0.85rem;
      color: #cbd5e1;
      font-weight: 600;
      letter-spacing: 0.03em;
      margin-bottom: 10px;
    }
    .stock-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 24px; }
    .stock-card {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 10px;
      padding: 14px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      cursor: pointer;
      transition: border-color 0.15s;
    }
    .stock-card:hover { border-color: #3b82f6; }
    .stock-card.active { border-color: #3b82f6; background: #1e3a5f; }
    .stock-info .name { font-weight: 600; font-size: 0.95rem; }
    .stock-info .symbol { font-size: 0.8rem; color: #94a3b8; margin-top: 2px; }
    .stock-right { display: flex; align-items: center; gap: 16px; }
    .stock-price { text-align: right; }
    .stock-price .price { font-weight: 700; font-size: 1rem; }
    .stock-price .change { font-size: 0.8rem; margin-top: 2px; }
    .up { color: #ef4444; }
    .down { color: #22c55e; }
    .btn-remove {
      background: none;
      border: 1px solid #334155;
      border-radius: 6px;
      color: #94a3b8;
      padding: 4px 10px;
      font-size: 0.8rem;
      cursor: pointer;
      transition: all 0.15s;
    }
    .btn-remove:hover { border-color: #ef4444; color: #ef4444; }

    /* Chart section */
    #chart-section { display: none; }
    #chart-section.visible { display: block; }
    .chart-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }
    .chart-title { font-size: 1rem; font-weight: 700; }
    .chart-subtitle { font-size: 0.8rem; color: #94a3b8; margin-top: 2px; }
    #chart-container {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 10px;
      overflow: hidden;
      margin-bottom: 12px;
    }
    #rsi-container {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 10px;
      overflow: hidden;
      margin-bottom: 24px;
    }
    .chart-legend {
      display: flex;
      gap: 16px;
      margin-bottom: 10px;
      font-size: 0.78rem;
    }
    .legend-item { display: flex; align-items: center; gap: 5px; }
    .legend-dot { width: 10px; height: 3px; border-radius: 2px; }

    .empty { color: #475569; font-size: 0.9rem; padding: 20px 0; }

    /* Rules */
    .rules-box {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 10px;
      padding: 14px;
    }
    .rules-box textarea {
      width: 100%;
      min-height: 280px;
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: 8px;
      padding: 10px 12px;
      color: #e2e8f0;
      font-size: 0.9rem;
      font-family: inherit;
      resize: vertical;
      outline: none;
    }
    .rules-box textarea:focus { border-color: #3b82f6; }
    .rules-box textarea::placeholder { color: #64748b; }
    .rules-actions {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-top: 10px;
    }
    .rules-status { font-size: 0.8rem; color: #94a3b8; }
    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      background: #334155;
      color: #e2e8f0;
      padding: 10px 20px;
      border-radius: 8px;
      font-size: 0.9rem;
      opacity: 0;
      transition: opacity 0.3s;
      pointer-events: none;
      z-index: 100;
    }
    .toast.show { opacity: 1; }

    /* Tabs */
    .tabs {
      display: flex;
      gap: 4px;
      border-bottom: 1px solid #334155;
      margin-bottom: 20px;
    }
    .tab-btn {
      background: none;
      border: none;
      color: #94a3b8;
      font-size: 0.95rem;
      font-weight: 600;
      padding: 10px 18px;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      transition: color 0.15s, border-color 0.15s;
    }
    .tab-btn:hover { color: #e2e8f0; }
    .tab-btn.active { color: #3b82f6; border-bottom-color: #3b82f6; }
    .tab-panel { display: none; }
    .tab-panel.active { display: block; }
  </style>
</head>
<body>

<header>
  <div class="logo">📈 Bower Stock</div>
  <div class="user">
    <span class="username">{{ display_name }}</span>
    <a href="/auth/logout">登出</a>
  </div>
</header>

<main>
  <div class="tabs">
    <button class="tab-btn active" id="tab-btn-chart" onclick="switchTab('chart')">K 線圖</button>
    <button class="tab-btn" id="tab-btn-rules" onclick="switchTab('rules')">個人規則</button>
  </div>

  <!-- Tab: K 線圖 -->
  <div class="tab-panel active" id="tab-chart">
    <!-- Add stock -->
    <div class="add-form">
      <input id="add-input" type="text" placeholder="股票代號（例如：2330）" maxlength="10" style="flex:1.2">
      <input id="cost-input" type="number" placeholder="成本（選填）" step="0.01" style="flex:1">
      <input id="qty-input" type="number" placeholder="股數（選填）" step="1" style="flex:1">
      <button class="btn" id="add-btn" onclick="addStock()">追蹤</button>
    </div>
    <div class="add-hint">不填成本 = 觀察進場訊號；填成本 = 追蹤賣出時機</div>

    <!-- Watchlist -->
    <div class="section-title">追蹤清單</div>
    <div class="stock-list" id="stock-list">
      <div class="empty">載入中…</div>
    </div>

    <!-- Chart -->
    <div id="chart-section">
      <div class="chart-header">
        <div>
          <div class="chart-title" id="chart-title"></div>
          <div class="chart-subtitle">K 線圖</div>
        </div>
      </div>
      <div class="chart-legend">
        <div class="legend-item"><div class="legend-dot" style="background:#3b82f6"></div> MA5</div>
        <div class="legend-item"><div class="legend-dot" style="background:#f59e0b"></div> MA20</div>
      </div>
      <div id="chart-container" style="height:280px"></div>
      <div class="chart-legend" style="margin-top:10px">
        <div class="legend-item"><div class="legend-dot" style="background:#a78bfa"></div> RSI(14)</div>
      </div>
      <div id="rsi-container" style="height:120px"></div>
    </div>
  </div>

  <!-- Tab: 個人規則 -->
  <div class="tab-panel" id="tab-rules">
    <div class="section-title">我的交易規則</div>
    <div class="rules-box">
      <textarea id="rules-input" placeholder="留空 = 使用系統預設規則（保守波段）。可自訂例如：策略：積極成長，RSI<30買進，獲利15%停利，停損10%"></textarea>
      <div class="rules-actions">
        <button class="btn" id="rules-save-btn" onclick="saveRules()">儲存規則</button>
        <span class="rules-status" id="rules-status"></span>
      </div>
    </div>
  </div>
</main>

<div class="toast" id="toast"></div>

<script>
let mainChart = null;
let rsiChart = null;
let activeSymbol = null;

// ── 頁籤切換 ──
function switchTab(name) {
  document.getElementById('tab-chart').classList.toggle('active', name === 'chart');
  document.getElementById('tab-rules').classList.toggle('active', name === 'rules');
  document.getElementById('tab-btn-chart').classList.toggle('active', name === 'chart');
  document.getElementById('tab-btn-rules').classList.toggle('active', name === 'rules');
  if (mainChart) mainChart.resize(document.getElementById('chart-container').clientWidth, 280);
  if (rsiChart) rsiChart.resize(document.getElementById('rsi-container').clientWidth, 120);
}

// ── 載入追蹤清單 ──
async function loadStocks() {
  const resp = await fetch('/api/stocks');
  if (!resp.ok) return;
  const stocks = await resp.json();
  const list = document.getElementById('stock-list');

  if (stocks.length === 0) {
    list.innerHTML = '<div class="empty">還沒有追蹤的股票，輸入代號開始追蹤。</div>';
    return;
  }

  list.innerHTML = stocks.map(s => {
    const up = s.change >= 0;
    const arrow = up ? '▲' : '▼';
    const sign = up ? '+' : '';
    const cls = up ? 'up' : 'down';

    let costInfo = '<div class="symbol">觀察中</div>';
    if (s.cost) {
      const gainUp = s.gain_pct >= 0;
      const gainSign = gainUp ? '+' : '';
      costInfo = `<div class="symbol">成本 ${s.cost} <span class="${gainUp ? 'up' : 'down'}">${gainSign}${s.gain_pct ?? '-'}%</span></div>`;
    }

    return `
      <div class="stock-card" id="card-${s.symbol}" onclick="loadChart('${s.symbol}', '${s.name}')">
        <div class="stock-info">
          <div class="name">${s.name}（${s.symbol}）</div>
          ${costInfo}
        </div>
        <div class="stock-right">
          <div class="stock-price">
            <div class="price">${s.price ?? '-'}</div>
            <div class="change ${cls}">${s.price ? `${arrow} ${sign}${s.change} (${sign}${s.change_pct}%)` : '-'}</div>
          </div>
          <button class="btn-remove" onclick="removeStock(event, '${s.symbol}')">移除</button>
        </div>
      </div>`;
  }).join('');
}

// ── 加入追蹤 ──
async function addStock() {
  const symbolInput = document.getElementById('add-input');
  const costInput = document.getElementById('cost-input');
  const qtyInput = document.getElementById('qty-input');
  const symbol = symbolInput.value.trim().toUpperCase();
  if (!symbol) return;

  const btn = document.getElementById('add-btn');
  btn.disabled = true;

  const params = new URLSearchParams();
  if (costInput.value) params.set('cost', costInput.value);
  if (qtyInput.value) params.set('qty', qtyInput.value);

  const resp = await fetch(`/api/stocks/${symbol}?${params}`, { method: 'POST' });
  if (resp.ok) {
    symbolInput.value = '';
    costInput.value = '';
    qtyInput.value = '';
    showToast(`✅ 已追蹤 ${symbol}`);
    await loadStocks();
  } else {
    const err = await resp.json();
    showToast(`❌ ${err.detail}`);
  }
  btn.disabled = false;
}

// ── 移除追蹤 ──
async function removeStock(e, symbol) {
  e.stopPropagation();
  await fetch(`/api/stocks/${symbol}`, { method: 'DELETE' });
  if (activeSymbol === symbol) {
    document.getElementById('chart-section').classList.remove('visible');
    activeSymbol = null;
  }
  showToast(`🗑 已移除 ${symbol}`);
  await loadStocks();
}

// ── 載入 K 線圖 ──
async function loadChart(symbol, name) {
  if (activeSymbol === symbol) return;
  activeSymbol = symbol;

  document.querySelectorAll('.stock-card').forEach(el => el.classList.remove('active'));
  const card = document.getElementById(`card-${symbol}`);
  if (card) card.classList.add('active');

  document.getElementById('chart-title').textContent = `${name}（${symbol}）`;
  document.getElementById('chart-section').classList.add('visible');
  document.getElementById('chart-section').scrollIntoView({ behavior: 'smooth', block: 'start' });

  // 清除舊圖
  if (mainChart) { mainChart.remove(); mainChart = null; }
  if (rsiChart) { rsiChart.remove(); rsiChart = null; }

  const resp = await fetch(`/api/chart/${symbol}`);
  if (!resp.ok) { showToast('❌ 圖表資料載入失敗'); return; }
  const data = await resp.json();

  // K 線圖
  mainChart = LightweightCharts.createChart(document.getElementById('chart-container'), {
    layout: { background: { color: '#1e293b' }, textColor: '#94a3b8' },
    grid: { vertLines: { color: '#334155' }, horzLines: { color: '#334155' } },
    rightPriceScale: { borderColor: '#334155' },
    timeScale: { borderColor: '#334155', timeVisible: true },
    crosshair: { mode: LightweightCharts.CrosshairMode.Normal },
  });
  mainChart.timeScale().fitContent();

  // 相容 v4 / v5 API
  const addCandle = mainChart.addCandlestickSeries
    ? (opt) => mainChart.addCandlestickSeries(opt)
    : (opt) => mainChart.addSeries(LightweightCharts.CandlestickSeries, opt);
  const addLine = (chart, opt) => chart.addLineSeries
    ? chart.addLineSeries(opt)
    : chart.addSeries(LightweightCharts.LineSeries, opt);

  const candleSeries = addCandle({
    upColor: '#ef4444', downColor: '#22c55e',
    borderUpColor: '#ef4444', borderDownColor: '#22c55e',
    wickUpColor: '#ef4444', wickDownColor: '#22c55e',
  });
  candleSeries.setData(data.candles);

  addLine(mainChart, { color: '#3b82f6', lineWidth: 1, priceLineVisible: false }).setData(data.ma5);
  addLine(mainChart, { color: '#f59e0b', lineWidth: 1, priceLineVisible: false }).setData(data.ma20);

  // RSI 圖
  rsiChart = LightweightCharts.createChart(document.getElementById('rsi-container'), {
    layout: { background: { color: '#1e293b' }, textColor: '#94a3b8' },
    grid: { vertLines: { color: '#334155' }, horzLines: { color: '#334155' } },
    rightPriceScale: { borderColor: '#334155' },
    timeScale: { borderColor: '#334155', visible: false },
    crosshair: { mode: LightweightCharts.CrosshairMode.Normal },
  });

  addLine(rsiChart, { color: '#a78bfa', lineWidth: 1, priceLineVisible: false }).setData(data.rsi);

  // 超買/超賣線
  const overbought = addLine(rsiChart, { color: '#ef4444', lineWidth: 1, lineStyle: 2, priceLineVisible: false });
  const oversold = addLine(rsiChart, { color: '#22c55e', lineWidth: 1, lineStyle: 2, priceLineVisible: false });
  if (data.rsi.length > 0) {
    const times = data.rsi.map(d => d.time);
    overbought.setData(times.map(t => ({ time: t, value: 70 })));
    oversold.setData(times.map(t => ({ time: t, value: 30 })));
  }

  rsiChart.timeScale().fitContent();
  mainChart.timeScale().subscribeVisibleLogicalRangeChange(range => {
    if (range) rsiChart.timeScale().setVisibleLogicalRange(range);
  });
}

// ── Enter 鍵送出 ──
document.getElementById('add-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') addStock();
});

// ── Toast ──
function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2500);
}

// ── 個人規則 ──
async function loadRules() {
  const resp = await fetch('/api/rules');
  if (!resp.ok) return;
  const data = await resp.json();
  document.getElementById('rules-input').value = data.rules || '';
}

async function saveRules() {
  const btn = document.getElementById('rules-save-btn');
  const status = document.getElementById('rules-status');
  const rules = document.getElementById('rules-input').value.trim();
  btn.disabled = true;

  const resp = await fetch('/api/rules', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ rules }),
  });

  if (resp.ok) {
    status.textContent = rules ? '✅ 已儲存個人規則' : '✅ 已清除，改用系統預設規則';
  } else {
    status.textContent = '❌ 儲存失敗';
  }
  setTimeout(() => { status.textContent = ''; }, 3000);
  btn.disabled = false;
}

loadStocks();
loadRules();
</script>
</body>
</html>
