<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bower Stock</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      background: #1e293b;
      border-radius: 16px;
      padding: 48px 40px;
      text-align: center;
      width: 100%;
      max-width: 360px;
      box-shadow: 0 4px 32px rgba(0,0,0,0.4);
    }
    .logo { font-size: 2.5rem; margin-bottom: 8px; }
    h1 { font-size: 1.5rem; font-weight: 700; margin-bottom: 8px; }
    p { color: #94a3b8; font-size: 0.9rem; margin-bottom: 32px; line-height: 1.6; }
    .btn-line {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: #06c755;
      color: #fff;
      font-size: 1rem;
      font-weight: 600;
      padding: 14px 28px;
      border-radius: 8px;
      text-decoration: none;
      transition: background 0.2s;
    }
    .btn-line:hover { background: #05b04a; }
    .btn-line svg { width: 22px; height: 22px; fill: #fff; }
    .disclaimer {
      margin-top: 24px;
      font-size: 0.75rem;
      color: #475569;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">📈</div>
    <h1>Bower Stock</h1>
    <p>台股智慧分析推播系統<br>用 LINE 帳號登入，管理你的追蹤清單</p>
    <a href="/auth/login" class="btn-line">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M12 2C6.48 2 2 6.12 2 11.2c0 3.56 2.18 6.67 5.43 8.43.24.13.32.37.24.6l-.5 1.82c-.08.27.16.52.43.43l2.1-.7c.18-.06.38-.04.55.06.72.39 1.5.65 2.34.76.3.04.41-.35.13-.48C9.3 20.64 7 17.19 7 13.2c0-4.42 4.03-8 9-8s9 3.58 9 8c0 4.42-4.03 8-9 8-.42 0-.83-.03-1.23-.08-.2-.03-.4.07-.48.25l-.53 1.2c-.1.23.08.48.33.45 .63-.07 1.27-.11 1.91-.11 5.52 0 10-4.12 10-9.2S17.52 2 12 2z"/>
      </svg>
      用 LINE 登入
    </a>
    <p class="disclaimer">⚠️ 本系統分析結果僅供個人參考，非投資建議</p>
  </div>
</body>
</html>
